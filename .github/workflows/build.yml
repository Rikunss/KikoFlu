name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Prepare Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret missing; skipping signing setup."
            exit 0
          fi
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          cat <<EOF > android/key.properties
          storeFile=app/release-key.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          chmod 600 android/app/release-key.jks android/key.properties
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build Universal APK
        run: flutter build apk --release
        
      - name: Rename Universal APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/KikoFlu-android-universe-release.apk
        
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi
        
      - name: Rename Split APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/KikoFlu-android-arm64-v8a-release.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/KikoFlu-android-armeabi-v7a-release.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/KikoFlu-android-x86_64-release.apk
          
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/KikoFlu-android-universe-release.apk
            build/app/outputs/flutter-apk/KikoFlu-android-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/KikoFlu-android-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/KikoFlu-android-x86_64-release.apk

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Enable Symlinks & Developer Mode (Windows)
        run: |
          # Enable symlink traversal (L2L/L2R/R2L/R2R)
          fsutil behavior set SymlinkEvaluation L2L:1 R2R:1 L2L:1 R2R:1 L2R:1 R2L:1 2>&1
          # Enable Developer Mode so non-admin users can create symlinks
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d 1 2>&1
        shell: pwsh
        continue-on-error: true

      - name: Build Windows Release
        continue-on-error: true
        run: flutter build windows --release

      - name: Patch cmake_install & re-run install
        continue-on-error: true
        shell: pwsh
        run: |
          # whisper_ggml_plus/ggml uses $<TARGET_FILE_DIR:KikoFlu> in cmake_install.cmake
          # which doesn't get evaluated — patch it to prevent the build failure
          $file = "build/windows/x64/plugins/whisper_ggml_plus/ggml/src/cmake_install.cmake"
          if (Test-Path $file) {
            (Get-Content $file) -replace '\$<TARGET_FILE_DIR:[^>]+>', 'KikoFlu' | Set-Content $file
            Write-Host "Patched cmake_install.cmake for whisper_ggml_plus"
          }
          cmake --install build/windows/x64 --config Release 2>&1 || Write-Host "cmake --install completed with warnings"

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get Version from Pubspec
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          if ($content -match "version:\s*([0-9]+\.[0-9]+\.[0-9]+)") {
            $version = $matches[1]
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Found version: $version"
          } else {
            Write-Error "Could not find version in pubspec.yaml"
            exit 1
          }

      - name: Build Installer
        run: iscc /DMyAppVersion="${{ steps.get_version.outputs.VERSION }}" installer_script.iss

      - name: Create Zip
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'KikoFlu-windows.zip'
          directory: 'build/windows/x64/runner/Release'

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: |
            build/windows/x64/runner/Release/KikoFlu-windows.zip
            Output/KikoFlu-windows-setup.exe


  macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build macOS Release
        env:
          EXCLUDED_ARCHS: x86_64
        run: flutter build macos --release
        
      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/macos/Build/Products/Release/KikoFlu.app build/dmg/
          hdiutil create -volname "KikoFlu" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            KikoFlu-macos.dmg
            
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: KikoFlu-macos.dmg

  linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev \
            libmpv-dev \
            libsqlite3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Create Archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/KikoFlu-linux-x64.tar.gz" .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: KikoFlu-linux-x64.tar.gz

  linux-arm64:
    name: Linux ARM64 Build
    runs-on: ubuntu-22.04
    if: false
    steps:
      - run: echo "Disabled"

  release:
    name: Create GitHub Release
    needs: [android, windows, macos, linux]
    if: always() && needs.android.result == 'success' && needs.windows.result == 'success' && needs.macos.result == 'success' && needs.linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          if ("$env:GITHUB_REF" -match "^refs/tags/v") {
            $version = "$env:GITHUB_REF_NAME".Substring(1)
          } else {
            $content = Get-Content pubspec.yaml -Raw
            if ($content -match "version:\s*([0-9]+\.[0-9]+\.[0-9]+)") {
              $version = $matches[1]
            } else {
              $version = "0.0.0"
            }
          }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release version: $version"

      - name: Check Existing Release
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.get_version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.get_version.outputs.VERSION }} already exists, skipping."
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Release Notes
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          echo "## 📦 Artifacts" > release-notes.md
          echo "" >> release-notes.md
          find artifacts -type f | sort | while read f; do
            size=$(du -h "$f" | cut -f1)
            name=$(basename "$f")
            echo "- \`$name\` ($size)" >> release-notes.md
          done
          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "_Built automatically by GitHub Actions._" >> release-notes.md

      - name: Create Release
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          name: "KikoFlu v${{ steps.get_version.outputs.VERSION }}"
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/android-release/*
            artifacts/windows-release/*
            artifacts/macos-release/*
            artifacts/linux-release/*
